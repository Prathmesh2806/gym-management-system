apiVersion: apps/v1
kind: Deployment
metadata:
  name: gym-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gym-frontend
  template:
    metadata:
      labels:
        app: gym-frontend
    spec:
      containers:
      - name: gym-frontend
        image: gymappregistryunique99.azurecr.io/gym-frontend:v2
        ports:
        - containerPort: 80
        # Environment variables so the React/Vue app knows where the APIs are
        env:
        - name: REACT_APP_BOOKING_URL
          value: "http://gym-booking-service:4001"
        - name: REACT_APP_MEMBERSHIP_URL
          value: "http://gym-membership-service:4002"
---
apiVersion: v1
kind: Service
metadata:
  name: gym-frontend-service
spec:
  selector:
    app: gym-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer # This triggers the creation of a Public IP in Azure
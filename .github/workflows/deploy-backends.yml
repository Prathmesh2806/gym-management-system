name: 2. Deploy Backends
on:
  repository_dispatch:
    types: [deploy-gym-backends]
  push:
    branches: [main]
    paths: ['src/booking/**', 'src/membership/**', 'src/notifier/**', 'kube/*-deploy.yaml']

jobs:
  backend-stage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set Environment
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "DEPLOY_ENV=${{ github.event.client_payload.env }}" >> $GITHUB_ENV
            echo "BOOKING_PROMOTE=${{ github.event.client_payload.booking_promote_tag }}" >> $GITHUB_ENV
            echo "MEMBERSHIP_PROMOTE=${{ github.event.client_payload.membership_promote_tag }}" >> $GITHUB_ENV
            echo "NOTIFIER_PROMOTE=${{ github.event.client_payload.notifier_promote_tag }}" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
          fi

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Names
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ] && [ -n "${{ github.event.client_payload.acr_name }}" ]; then
            echo "ACR_NAME=${{ github.event.client_payload.acr_name }}" >> $GITHUB_ENV
            
            # Use source_acr_name from payload if it exists (for dynamic lookup)
            if [ -n "${{ github.event.client_payload.source_acr_name }}" ]; then
              echo "DEV_ACR_NAME=${{ github.event.client_payload.source_acr_name }}" >> $GITHUB_ENV
            else
              echo "DEV_ACR_NAME=gymappregdevunique" >> $GITHUB_ENV
            fi
          else
            echo "ACR_NAME=gym${{ env.DEPLOY_ENV }}acr" >> $GITHUB_ENV
            echo "DEV_ACR_NAME=gymappregdevunique" >> $GITHUB_ENV
          fi
          
          echo "RG_NAME=gym-app-${{ env.DEPLOY_ENV }}-rg" >> $GITHUB_ENV
          echo "CLUSTER_NAME=gym-${{ env.DEPLOY_ENV }}-aks" >> $GITHUB_ENV

      - name: Build and Deploy Loop
        run: |
          rm -f ~/.kube/config
          az acr login --name ${{ env.ACR_NAME }}
          az aks get-credentials --resource-group ${{ env.RG_NAME }} --name ${{ env.CLUSTER_NAME }} --overwrite-existing
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          SERVICES=("booking" "membership" "notifier")
          
          for SERVICE in "${SERVICES[@]}"; do
            BUILD_REQUIRED=false
            DEPLOY_REQUIRED=false
            FINAL_TAG=""

            # Check for source changes
            if [ "${{ github.event_name }}" == "repository_dispatch" ] || git diff --name-only HEAD^ HEAD | grep -q "src/$SERVICE"; then
                BUILD_REQUIRED=true
                DEPLOY_REQUIRED=true
            fi
            
            # Check for deployment YAML changes
            if git diff --name-only HEAD^ HEAD | grep -q "kube/$SERVICE-deploy.yaml"; then
                DEPLOY_REQUIRED=true
            fi

            # Handle Promotion
            VAR_NAME=$(echo "${SERVICE}_PROMOTE" | tr '[:lower:]' '[:upper:]')
            PROMOTE_TAG=${!VAR_NAME}
            
            if [ -n "$PROMOTE_TAG" ] && [ "${{ env.DEPLOY_ENV }}" != "dev" ]; then
                echo "Promoting $SERVICE with tag $PROMOTE_TAG from Dev ACR..."
                az acr import --name ${{ env.ACR_NAME }} --source ${{ env.DEV_ACR_NAME }}.azurecr.io/gym-$SERVICE:$PROMOTE_TAG --image gym-$SERVICE:$PROMOTE_TAG --force
                FINAL_TAG=$PROMOTE_TAG
                DEPLOY_REQUIRED=true
            elif [ "$BUILD_REQUIRED" == "true" ]; then
                echo "Building fresh image for $SERVICE..."
                IMAGE_TAG="$SERVICE-$SHORT_SHA"
                docker build -t ${{ env.ACR_NAME }}.azurecr.io/gym-$SERVICE:$IMAGE_TAG ./src/$SERVICE
                docker push ${{ env.ACR_NAME }}.azurecr.io/gym-$SERVICE:$IMAGE_TAG
                FINAL_TAG=$IMAGE_TAG
            fi

            if [ "$DEPLOY_REQUIRED" == "true" ]; then
                if [ -n "$FINAL_TAG" ]; then
                    echo "Updating image tag to $FINAL_TAG in kube/$SERVICE-deploy.yaml"
                    sed -i "s|image:.*|image: ${{ env.ACR_NAME }}.azurecr.io/gym-$SERVICE:$FINAL_TAG|" kube/$SERVICE-deploy.yaml
                fi
                echo "Deploying $SERVICE to AKS..."
                kubectl apply -f kube/$SERVICE-deploy.yaml
            else
                echo "--- Skipping $SERVICE (No changes detected in src/$SERVICE or kube/$SERVICE-deploy.yaml) ---"
            fi
          done


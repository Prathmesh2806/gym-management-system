name: Deploy Gym App

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # These now match your folder names in /src and files in /kube
        service: [db, frontend, booking, membership, notifier]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure Container Registry Login
        run: az acr login --name gymappregistryunique99

      - name: Build and Push Image
        run: |
          # 1. Path is now ./src/${{ matrix.service }} (no gym- prefix)
          # 2. Image name stays gym-${{ matrix.service }} to match your ACR registry
          docker build -t gymappregistryunique99.azurecr.io/gym-${{ matrix.service }}:${{ github.sha }} ./src/${{ matrix.service }}
          docker push gymappregistryunique99.azurecr.io/gym-${{ matrix.service }}:${{ github.sha }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: gym-app-production-rg
          cluster-name: gym-aks-cluster

      - name: Deploy to AKS
        run: |
          # 1. Update the image tag in the YAML file dynamically
          # This matches your files like kube/db-deploy.yaml
          sed -i "s|image: .*|image: gymappregistryunique99.azurecr.io/gym-${{ matrix.service }}:${{ github.sha }}|g" kube/${{ matrix.service }}-deploy.yaml
          
          # 2. Apply the manifest
          kubectl apply -f kube/${{ matrix.service }}-deploy.yaml
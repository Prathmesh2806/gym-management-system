name: "Dev Application Deployment"

on:
  workflow_dispatch:
    inputs:
      deploy_db:
        description: 'Deploy Database?'
        type: boolean
        default: true
      deploy_backends:
        description: 'Deploy Backends?'
        type: boolean
        default: true
      deploy_frontend:
        description: 'Deploy Frontend?'
        type: boolean
        default: true

jobs:
  orchestrate:
    name: "Deploying App to DEV"
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve ACR Name
        id: resolve
        run: |
          RG_NAME="gym-app-dev-rg"
          ACR_NAME=$(az acr list --resource-group "$RG_NAME" --query "[0].name" -o tsv)
          if [ -z "$ACR_NAME" ]; then
            echo "Error: No ACR found in $RG_NAME"
            exit 1
          fi
          echo "acr_name=$ACR_NAME" >> $GITHUB_OUTPUT
          echo "Found ACR: $ACR_NAME"

      - name: Trigger Database Deployment
        if: github.event.inputs.deploy_db == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT_TOKEN }}
          event-type: deploy-gym-db
          client-payload: '{"env": "dev", "acr_name": "${{ steps.resolve.outputs.acr_name }}"}'

      - name: Trigger Backend Deployment
        if: github.event.inputs.deploy_backends == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT_TOKEN }}
          event-type: deploy-gym-backends
          client-payload: '{"env": "dev", "acr_name": "${{ steps.resolve.outputs.acr_name }}"}'

      - name: Trigger Frontend Deployment
        if: github.event.inputs.deploy_frontend == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT_TOKEN }}
          event-type: deploy-gym-frontend
          client-payload: '{"env": "dev", "acr_name": "${{ steps.resolve.outputs.acr_name }}"}'

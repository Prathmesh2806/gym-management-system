name: "Terraform Multi-Env Deployment"

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment selection (dev/qa/prod/dr)'
        required: true
        type: choice
        options: [dev, qa, prod, dr]
      action:
        description: 'Select Action'
        required: true
        type: choice
        options: [plan, apply, destroy]
      deploy_db:
        description: 'Deploy Database after Infra?'
        type: boolean
        default: true
      deploy_backends:
        description: 'Deploy Backends after Infra?'
        type: boolean
        default: true
      deploy_frontend:
        description: 'Deploy Frontend after Infra?'
        type: boolean
        default: true
      db_promote_tag:
        description: 'Tag to promote for Database (Leave empty to build fresh)'
        type: string
        required: false
      booking_promote_tag:
        description: 'Tag to promote for Booking (Leave empty to build fresh)'
        type: string
        required: false
      membership_promote_tag:
        description: 'Tag to promote for Membership (Leave empty to build fresh)'
        type: string
        required: false
      notifier_promote_tag:
        description: 'Tag to promote for Notifier (Leave empty to build fresh)'
        type: string
        required: false
      frontend_promote_tag:
        description: 'Tag to promote for Frontend (Leave empty to build fresh)'
        type: string
        required: false

jobs:
  terraform:
    name: "Deploying to ${{ github.event.inputs.env }}"
    runs-on: ubuntu-latest
    
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 1: Backend Storage check
      - name: Ensure Backend Storage Exists
        run: |
          az group create --name "tfstate-mgmt-rg" --location "eastus2"
          az storage account create --name "gymtfstate${{ github.event.inputs.env }}unique" --resource-group "tfstate-mgmt-rg" --sku Standard_LRS
          az storage container create --name "tfstate" --account-name "gymtfstate${{ github.event.inputs.env }}unique"
          az network public-ip create --resource-group "tfstate-mgmt-rg" --name "gym-appgw-pip-${{ github.event.inputs.env }}" --sku Standard --allocation-method Static --location "eastus2"
        continue-on-error: true 

      # Step 2: Terraform Init (Dynamic Backend)
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=tfstate-mgmt-rg" \
            -backend-config="storage_account_name=gymtfstate${{ github.event.inputs.env }}unique" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"
        working-directory: ./infrastructure

      # Step 3: Terraform Plan 
      - name: Terraform Plan
        run: |
          terraform plan \
            -var="env=${{ github.event.inputs.env }}" \
            -var-file="envs/${{ github.event.inputs.env }}.tfvars" \
            -out=tfplan
        working-directory: ./infrastructure

      # Step 4: Terraform Apply 
      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply "tfplan"
        working-directory: ./infrastructure

      - name: Get ACR Name and Public IP
        id: get_outputs
        run: |
          ACR_NAME=$(terraform output -raw acr_name)
          echo "acr_name=$ACR_NAME" >> $GITHUB_OUTPUT
          
          # Fetch the Public IP address of the App Gateway
          PUBLIC_IP=$(az network public-ip show --resource-group "tfstate-mgmt-rg" --name "gym-appgw-pip-${{ github.event.inputs.env }}" --query ipAddress -o tsv)
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
        working-directory: ./infrastructure

      - name: Update DuckDNS Domain
        if: github.event.inputs.action == 'apply' && success()
        run: |
          IP_ADDR=$(echo "${{ steps.get_outputs.outputs.public_ip }}" | tr -d '\r' | tr -d '\n' | xargs)
          TOKEN=$(echo "${{ secrets.DUCKDNS_TOKEN }}" | tr -d '\r' | tr -d '\n' | xargs)
          echo "Updating the-fitness-arena.duckdns.org to point to $IP_ADDR..."
          curl -v "https://www.duckdns.org/update?domains=the-fitness-arena&token=$TOKEN&ip=$IP_ADDR"

      # Step: Trigger Application Deployment
      - name: Trigger Database Deployment
        if: github.event.inputs.action == 'apply' && github.event.inputs.deploy_db == 'true' && success()
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GH_PAT_TOKEN }} 
          event-type: deploy-gym-db
          client-payload: '{"env": "${{ github.event.inputs.env }}" , "acr_name": "${{ steps.get_outputs.outputs.acr_name }}", "promote_tag": "${{ github.event.inputs.db_promote_tag }}"}'

      - name: Trigger Backend Deployment
        if: github.event.inputs.action == 'apply' && github.event.inputs.deploy_backends == 'true' && success()
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GH_PAT_TOKEN }}
          event-type: deploy-gym-backends
          client-payload: '{"env": "${{ github.event.inputs.env }}" , "acr_name": "${{ steps.get_outputs.outputs.acr_name }}", "booking_promote_tag": "${{ github.event.inputs.booking_promote_tag }}", "membership_promote_tag": "${{ github.event.inputs.membership_promote_tag }}", "notifier_promote_tag": "${{ github.event.inputs.notifier_promote_tag }}"}'

      - name: Trigger Frontend Deployment
        if: github.event.inputs.action == 'apply' && github.event.inputs.deploy_frontend == 'true' && success()
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GH_PAT_TOKEN }}
          event-type: deploy-gym-frontend
          client-payload: '{"env": "${{ github.event.inputs.env }}" , "acr_name": "${{ steps.get_outputs.outputs.acr_name }}", "promote_tag": "${{ github.event.inputs.frontend_promote_tag }}"}'

      # Step 5: Terraform Destroy 
      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var="env=${{ github.event.inputs.env }}" \
            -var-file="envs/${{ github.event.inputs.env }}.tfvars" \
            -auto-approve
        working-directory: ./infrastructure
name: 3. Deploy Frontend
on:
  repository_dispatch:
    types: [deploy-gym-frontend]
  push:
    branches: [main]
    paths: ['src/frontend/**', 'kube/frontend-deploy.yaml', 'kube/gym-ingress.yaml']

jobs:
  frontend-stage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set Environment
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "DEPLOY_ENV=${{ github.event.client_payload.env }}" >> $GITHUB_ENV
            echo "PROMOTE_TAG=${{ github.event.client_payload.promote_tag }}" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
            echo "PROMOTE_TAG=" >> $GITHUB_ENV
          fi

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Context
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ] && [ -n "${{ github.event.client_payload.acr_name }}" ]; then
            echo "ACR_NAME=${{ github.event.client_payload.acr_name }}" >> $GITHUB_ENV
          else
            echo "ACR_NAME=gym${{ env.DEPLOY_ENV }}acr" >> $GITHUB_ENV
          fi
          
          echo "RG_NAME=gym-app-${{ env.DEPLOY_ENV }}-rg" >> $GITHUB_ENV
          echo "CLUSTER_NAME=gym-${{ env.DEPLOY_ENV }}-aks" >> $GITHUB_ENV
          echo "DEV_ACR_NAME=gymappregdevunique" >> $GITHUB_ENV
          
      - name: Build, Push and Deploy
        run: |
          rm -f ~/.kube/config
          az acr login --name ${{ env.ACR_NAME }}
          az aks get-credentials --resource-group ${{ env.RG_NAME }} --name ${{ env.CLUSTER_NAME }} --overwrite-existing
          
          # Install cert-manager
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.2/cert-manager.yaml
          # Wait for cert-manager webhooks to be ready
          sleep 30
          
          # Apply the ClusterIssuer
          kubectl apply -f kube/cluster-issuer.yaml
          
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          
          if [ -n "$PROMOTE_TAG" ] && [ "${{ env.DEPLOY_ENV }}" != "dev" ]; then
            echo "Promoting frontend with tag $PROMOTE_TAG from Dev ACR..."
            az acr import --name ${{ env.ACR_NAME }} --source ${{ env.DEV_ACR_NAME }}.azurecr.io/gym-frontend:$PROMOTE_TAG --image gym-frontend:$PROMOTE_TAG --force
            FINAL_TAG=$PROMOTE_TAG
          else
            echo "Building fresh frontend image..."
            FINAL_TAG="frontend-$SHORT_SHA"
            docker build -t ${{ env.ACR_NAME }}.azurecr.io/gym-frontend:$FINAL_TAG ./src/frontend
            docker push ${{ env.ACR_NAME }}.azurecr.io/gym-frontend:$FINAL_TAG
          fi
          
          sed -i "s|image:.*|image: ${{ env.ACR_NAME }}.azurecr.io/gym-frontend:$FINAL_TAG|" kube/frontend-deploy.yaml
          
          # Inject Environment Specific Hostname and TLS secret into Ingress
          DOMAIN="the-fitness-arena-${{ env.DEPLOY_ENV }}.duckdns.org"
          TLS_SECRET="gym-tls-${{ env.DEPLOY_ENV }}"
          echo "Updating Ingress to use Domain: $DOMAIN and Secret: $TLS_SECRET"
          
          sed -i "s|__DOMAIN__|$DOMAIN|g" kube/gym-ingress.yaml
          sed -i "s|__TLS_SECRET__|$TLS_SECRET|g" kube/gym-ingress.yaml
          
          kubectl apply -f kube/frontend-deploy.yaml
          kubectl apply -f kube/gym-ingress.yaml
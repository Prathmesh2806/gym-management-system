name: 3. Deploy Frontend
on:
  workflow_run:
    workflows: ["2. Deploy Backends"]
    types: [completed]
  push:
    branches:
      - main
    paths: 
      - 'src/frontend/**'
      - 'kube/frontend-deploy.yaml'
      - 'kube/gym-ingress.yaml' 

jobs:
  frontend-stage:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: 'gym-app-production-rg' 
          cluster-name: 'gym-aks-cluster'        

      - name: Build and Push Frontend
        run: |
          az acr login --name gymappregistryunique99
          docker build -t gymappregistryunique99.azurecr.io/gym-frontend:${{ github.sha }} ./src/frontend
          docker push gymappregistryunique99.azurecr.io/gym-frontend:${{ github.sha }}

      - name: Deploy to K8s
        run: |
          # Image update kar
          sed -i 's|image:.*|image: gymappregistryunique99.azurecr.io/gym-frontend:${{ github.sha }}|' kube/frontend-deploy.yaml
          
          # Deploy frontend service & deployment
          kubectl apply -f kube/frontend-deploy.yaml
          
          # 2. ATA INGRESS APPLY KAR (Important!)
          kubectl apply -f kube/gym-ingress.yaml
          
          # Rollout check
          kubectl rollout status deployment/gym-frontend --timeout=90s
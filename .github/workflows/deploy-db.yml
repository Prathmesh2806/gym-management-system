name: 1. Deploy Database
on:
  repository_dispatch:
    types: [deploy-gym-db] 
  push:
    branches: [main]
    paths: ['src/db/**', 'kube/db-deploy.yaml'] 
  workflow_dispatch:
    inputs:
      env:
        description: 'which env to deploy'
        required: true
        default: 'dev'

jobs:
  db-stage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

     
      - name: Set Environment Name
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "DEPLOY_ENV=${{ github.event.client_payload.env }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "push" ]; then
            # Push logic sathi tuza default 'dev' dharu
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=${{ github.event.inputs.env }}" >> $GITHUB_ENV
          fi

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      
      - name: Set Dynamic Names
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "ACR_NAME=${{ github.event.client_payload.acr_name }}" >> $GITHUB_ENV
            echo "PROMOTE_TAG=${{ github.event.client_payload.promote_tag }}" >> $GITHUB_ENV
            
            # Use source_acr_name from payload if it exists (for dynamic lookup)
            if [ -n "${{ github.event.client_payload.source_acr_name }}" ]; then
              echo "DEV_ACR_NAME=${{ github.event.client_payload.source_acr_name }}" >> $GITHUB_ENV
            else
              echo "DEV_ACR_NAME=gymappregdevunique" >> $GITHUB_ENV
            fi
          else
            echo "ACR_NAME=gym${{ env.DEPLOY_ENV }}acr" >> $GITHUB_ENV
            echo "PROMOTE_TAG=" >> $GITHUB_ENV
            echo "DEV_ACR_NAME=gymappregdevunique" >> $GITHUB_ENV
          fi
          
          echo "RG_NAME=gym-app-${{ env.DEPLOY_ENV }}-rg" >> $GITHUB_ENV
          echo "CLUSTER_NAME=gym-${{ env.DEPLOY_ENV }}-aks" >> $GITHUB_ENV

      - name: Build and Push DB Image
        run: |
          az acr login --name ${{ env.ACR_NAME }}
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          
          if [ -n "$PROMOTE_TAG" ] && [ "${{ env.DEPLOY_ENV }}" != "dev" ]; then
            echo "Promoting image with tag $PROMOTE_TAG from Dev ACR..."
            az acr import --name ${{ env.ACR_NAME }} --source ${{ env.DEV_ACR_NAME }}.azurecr.io/gym-db:$PROMOTE_TAG --image gym-db:$PROMOTE_TAG --force
            echo "FINAL_TAG=$PROMOTE_TAG" >> $GITHUB_ENV
          else
            echo "Building fresh image..."
            IMAGE_TAG="db-$SHORT_SHA"
            docker build -t ${{ env.ACR_NAME }}.azurecr.io/gym-db:$IMAGE_TAG ./src/db
            docker push ${{ env.ACR_NAME }}.azurecr.io/gym-db:$IMAGE_TAG
            echo "FINAL_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          fi

      - name: Clean Kubeconfig
        run: rm -f ~/.kube/config

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RG_NAME }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Deploy to K8s
        run: |
          # Image naav YAML madhye dynamic update karne
          sed -i "s|image:.*|image: ${{ env.ACR_NAME }}.azurecr.io/gym-db:${{ env.FINAL_TAG }}|" kube/db-deploy.yaml
          kubectl apply -f kube/db-deploy.yaml
          kubectl rollout status deployment/gym-db --timeout=120s


server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend services
    # CHANGED: 'gym-booking' -> 'gym-booking-service'
    location /api/classes {
        proxy_pass http://gym-booking-service:4001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/bookings {
        proxy_pass http://gym-booking-service:4001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # CHANGED: 'gym-membership' -> 'gym-membership-service'
    location /api/plans {
        proxy_pass http://gym-membership-service:4002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/members {
        proxy_pass http://gym-membership-service:4002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/stats {
        proxy_pass http://gym-membership-service:4002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # CHANGED: 'gym-notifier' -> 'gym-notifier-service'
    location /api/notifications {
        proxy_pass http://gym-notifier-service:4003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/notify {
        proxy_pass http://gym-notifier-service:4003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}